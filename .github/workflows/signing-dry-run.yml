# Temporary: verifies the GPG signing secrets work, without publishing anything.
# Run it manually from the Actions tab (Run workflow), confirm it is green and
# lists .asc signatures, then delete this file. It never reaches the deploy
# phase, so no token is used and nothing is uploaded.
name: Signing dry-run

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.OSSRH_GPG_SECRET_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Sign artifacts (verify phase only, no deploy)
        run: mvn -B -ntp -Prelease -DskipTests -Dgpg.passphrase=${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }} verify

      - name: List generated signatures
        run: |
          echo "Detached GPG signatures produced:"
          find . -name '*.asc' -print
          test -n "$(find . -name '*.asc' -print -quit)" || { echo "No signatures were produced"; exit 1; }
