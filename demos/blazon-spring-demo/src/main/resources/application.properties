# The demo has no web server; it starts, prints the banner, and exits.
spring.main.web-application-type=none

# The banner text is derived from the application name: "blazon-demo" becomes
# "BLAZON DEMO". The version line is picked up from spring.application.version,
# and the git commit is appended automatically once git.properties is imported
# (generated by the git-commit-id plugin; optional so it works without a repo).
spring.application.name=blazon-demo
spring.application.version=1.0.0
spring.config.import=optional:classpath:git.properties

# Force colour so the gradient shows even when output is not an interactive
# terminal (e.g. under Maven). Other optional knobs: blazon.palette, blazon.text,
# blazon.margin, blazon.metadata, blazon.enabled.
blazon.color=truecolor
blazon.palette=EMBER
